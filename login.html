<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAGE - Entrar</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">

    <!-- Chama o CSS -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

    <div class="logo-kage">
        <span class="logo-white">K</span><span class="logo-red">AGE</span>
    </div>

    <h2>Entrar na sua conta</h2>

    <input class="input-box" type="email" id="email" placeholder="E-mail">
    <input class="input-box" type="password" id="senha" placeholder="Senha">

    <button class="btn" onclick="entrar()">Entrar</button>

    <div class="divider"></div>

    <button class="btn" onclick="entrarSemCadastro()">Entrar sem cadastro</button>  

</div>

<!-- Chama o JavaScript -->
<script src="login.js"></script>

</body>
</html>
