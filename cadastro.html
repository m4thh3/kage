<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="cadastro.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAGE - Criar Conta</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="page-container">

        <section class="register-card">

            <div class="logo-kage">
                <span class="logo-white">K</span><span class="logo-red">AGE</span>
            </div>

            <h1>Criar conta</h1>
            <p class="subtitle">Entre para a coleção KAGE e acompanhe seus pedidos.</p>

            <form id="registerForm">

                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="Digite seu telefone">
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha">
                </div>

                <div class="input-group">
                    <label for="confirmarSenha">Confirmar senha</label>
                    <input type="password" id="confirmarSenha" placeholder="Repita sua senha">
                </div>

                <label class="terms">
                    <input type="checkbox" id="termos">
                    <span>Eu aceito os termos e quero criar minha conta KAGE.</span>
                </label>

                <button type="submit" class="btn-primary">Criar conta</button>

            </form>

            <div class="divider"></div>

            <button class="btn-secondary" onclick="entrarSemCadastro()">Entrar sem cadastro</button>

            <p class="login-link">
                Já tem uma conta?
                <a class="option" href="file:///C:/Users/micro/OneDrive/Desktop/kage/Login/login.html">Entrar Agora</a>
            </p>

        </section>

    </main>

    <script src="cadastro.js"></script>
</body>
</html>
